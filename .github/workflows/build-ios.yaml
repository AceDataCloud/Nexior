name: Build iOS

on:
  push:
    tags:
      - 'ios-v*'
  workflow_dispatch:
    inputs:
      force:
        description: 'Build even if this version already exists in TestFlight (default: skip duplicates).'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  preflight:
    name: Preflight (skip if TestFlight already has this build)
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
      version-name: ${{ steps.version.outputs.name }}
      version-code: ${{ steps.version.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r major minor patch <<< "$VERSION"
          CODE=$((major * 10000 + minor * 100 + patch))
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE"   >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION  Code: $CODE"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check TestFlight for existing build
        id: check
        env:
          FORCE: ${{ inputs.force }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          BUNDLE_ID: com.acedatacloud.nexior
          BUILD_NUMBER: ${{ steps.version.outputs.code }}
        # Queries App Store Connect for a build with CFBundleVersion == BUILD_NUMBER
        # under our app and sets should-build=false if one already exists. On any
        # API failure we fail-open (should-build=true) so a flaky preflight never
        # blocks a release; the actual altool upload will surface the real error.
        run: |
          if [ "$FORCE" = "true" ]; then
            echo "::notice::force=true → skipping TestFlight duplicate check."
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 -m pip install --quiet 'pyjwt[crypto]==2.10.1' requests
          python3 <<'PY'
          import base64, os, time, requests, jwt
          try:
              now = int(time.time())
              key_pem = base64.b64decode(os.environ['ASC_KEY_BASE64']).decode()
              token = jwt.encode(
                  {'iss': os.environ['ASC_ISSUER_ID'], 'iat': now, 'exp': now + 1200, 'aud': 'appstoreconnect-v1'},
                  key_pem,
                  algorithm='ES256',
                  headers={'kid': os.environ['ASC_KEY_ID'], 'typ': 'JWT'},
              )
              h = {'Authorization': f'Bearer {token}'}
              bundle = os.environ['BUNDLE_ID']
              build_num = os.environ['BUILD_NUMBER']
              r = requests.get(
                  'https://api.appstoreconnect.apple.com/v1/apps',
                  headers=h, params={'filter[bundleId]': bundle}, timeout=30,
              )
              r.raise_for_status()
              apps = r.json().get('data', [])
              if not apps:
                  print(f"::warning::No App Store Connect app for bundleId={bundle} — letting build proceed.")
                  should = 'true'
              else:
                  app_id = apps[0]['id']
                  r = requests.get(
                      'https://api.appstoreconnect.apple.com/v1/builds',
                      headers=h,
                      params={'filter[app]': app_id, 'filter[version]': build_num, 'limit': 1},
                      timeout=30,
                  )
                  r.raise_for_status()
                  builds = r.json().get('data', [])
                  if builds:
                      print(f"::notice::TestFlight already has build {build_num} for {bundle} — skipping.")
                      should = 'false'
                  else:
                      print(f"Build {build_num} not yet uploaded — proceeding.")
                      should = 'true'
          except Exception as e:
              print(f"::warning::TestFlight preflight check failed ({e!r}) — letting build proceed.")
              should = 'true'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'should-build={should}\n')
          print(f'should-build={should}')
          PY

  build:
    name: Build & Upload to TestFlight
    needs: preflight
    if: needs.preflight.outputs.should-build == 'true'
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26+
        # App Store Connect requires the iOS 26 SDK (Xcode 26+) for uploads
        # starting April 2026. The macos-15 runner default is Xcode 16.4 which
        # ships with the iOS 18.5 SDK and altool will reject the build with a
        # 409 "SDK version issue" validation error.
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST_XCODE" ]; then
            echo "::error::No Xcode 26+ found on runner. Available Xcodes:"
            ls -d /Applications/Xcode_*.app
            exit 1
          fi
          echo "Selecting $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE"
          xcodebuild -version

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build web assets (iOS surface)
        run: npm run build:ios

      - name: Copy web assets to iOS project
        run: npx cap copy ios

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Set version in Xcode project
        env:
          VERSION_NAME: ${{ needs.preflight.outputs.version-name }}
          VERSION_CODE: ${{ needs.preflight.outputs.version-code }}
        run: |
          cd ios/App
          agvtool new-marketing-version "$VERSION_NAME"
          agvtool new-version -all "$VERSION_CODE"

      - name: Install Apple certificate and provisioning profile
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode files
          echo "$P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build archive
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}"

      - name: Create ExportOptions.plist
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${{ secrets.IOS_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.acedatacloud.nexior</key>
                  <string>${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}</string>
              </dict>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexior-${{ needs.preflight.outputs.version-name }}.ipa
          path: ${{ runner.temp }}/export/*.ipa

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          # Decode API key
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            > ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          # Upload via xcrun
          xcrun altool --upload-app \
            --type ios \
            --file "$(find $RUNNER_TEMP/export -name '*.ipa')" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
