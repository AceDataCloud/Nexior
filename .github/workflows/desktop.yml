name: Desktop

# Build the Nexior desktop client (Windows .exe + macOS .dmg) and, for releases,
# publish to Tencent Cloud COS so electron-updater can pick it up.
#
# Triggers:
#   - pull_request (desktop paths)        → E2E smoke only
#   - schedule (daily 04:07 Beijing)      → E2E + build .exe/.dmg beta artifacts
#                                           (30-day retention; NO release attach,
#                                            NO COS publish). Daily — not per merge —
#                                            because the macOS leg bills at 10x.
#   - push tag `desktop-v*`               → E2E + build + PUBLISH to `latest`
#   - workflow_dispatch (channel/dry_run) → E2E + build + (optional) PUBLISH
#
# The macOS/Windows build used to fire on every beachball release tag
# (@acedatacloud/nexior_v*), i.e. almost every merge — the single biggest
# desktop Actions cost. It's now a once-daily beta build; the live auto-update
# feed (COS) is still an admin-gated `desktop-v*` release, untouched.
#
# Required repo secrets:
#   TENCENT_CLOUD_SECRET_ID / TENCENT_CLOUD_SECRET_KEY        COS upload
#   VITE_STRIPE_PUBLISHABLE_KEY                               renderer build
#   WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD                       Windows signing (optional)
#   MAC_CSC_LINK / MAC_CSC_KEY_PASSWORD                       macOS Developer ID (optional)
#   APP_STORE_CONNECT_KEY_BASE64 / _KEY_ID / _ISSUER_ID, IOS_TEAM_ID   notarization (reused from iOS)

on:
  pull_request:
    paths:
      - 'electron/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'electron-builder.yml'
      - 'build/icon.icns'
      - 'build/icon.ico'
      - 'build/icon.png'
      - 'playwright.config.ts'
      - 'e2e/**'
      - 'scripts/copy-renderer.js'
      - 'scripts/gen-brand-icons.py'
      - 'scripts/gen-desktop-icons.sh'
      - 'scripts/gen-windows-icon.py'
      - 'scripts/publish_desktop_release.py'
      - '.github/workflows/desktop.yml'
  schedule:
    # 04:07 Beijing time (UTC 20:07), off the top of the hour to dodge cron
    # congestion. Daily beta build of the desktop installers.
    - cron: '7 20 * * *'
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel (latest = stable, beta = pre-release).'
        required: true
        default: 'beta'
        type: choice
        options:
          - latest
          - beta
      dry_run:
        description: 'Build but skip the COS publish.'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # --------------------------------------------------------------------------
  # E2E smoke — runs on every event. Boots the real Electron app over
  # app://bundle and asserts the SPA is served (catches the white-screen mode).
  # --------------------------------------------------------------------------
  e2e:
    name: E2E smoke (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build renderer (desktop surface)
        env:
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
        run: npm run build:electron
      - name: Compile main process + stage renderer
        run: |
          npm run compile:electron
          node scripts/copy-renderer.js
      - name: Run Electron E2E smoke (xvfb)
        run: xvfb-run --auto-servernum npm run test:e2e:desktop

  # --------------------------------------------------------------------------
  # Resolve the channel and whether this run publishes to the live feed.
  #   tag desktop-v*  → latest, publish
  #   workflow_dispatch → chosen channel, publish unless dry_run
  #   push to main    → beta, build artifacts only (no publish)
  # --------------------------------------------------------------------------
  resolve:
    name: Resolve channel
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      channel: ${{ steps.c.outputs.channel }}
      publish: ${{ steps.c.outputs.publish }}
    steps:
      - id: c
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "channel=${{ inputs.channel }}" >> "$GITHUB_OUTPUT"
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "publish=false" >> "$GITHUB_OUTPUT"
            else
              echo "publish=true" >> "$GITHUB_OUTPUT"
            fi
          elif [[ "${{ github.ref }}" == refs/tags/desktop-v* ]]; then
            echo "channel=latest" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            # push to main → auto-build beta installers as artifacts, no publish
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

  # --------------------------------------------------------------------------
  # Build the .exe + .dmg on every push (auto). NO approval gate here — the gate
  # is on the publish job. Signs when certs are present; unsigned otherwise
  # (refused only for the stable `latest` channel).
  # --------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }})
    needs: [e2e, resolve]
    # Only the build job needs write (to attach installers on the version tag);
    # e2e (which runs PR-controlled npm scripts) and resolve stay read-only.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Package (sign + notarize when certs present)
        shell: bash
        env:
          ELECTRON_BUILDER_CHANNEL: ${{ needs.resolve.outputs.channel }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Notarization via the App Store Connect API key (reuses iOS secrets).
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          set -euo pipefail
          EXTRA=()
          SIGN=false

          if [ "${{ runner.os }}" = "Windows" ]; then
            if [ -n "$WIN_CSC_LINK" ]; then
              export CSC_LINK="$WIN_CSC_LINK" CSC_KEY_PASSWORD="$WIN_CSC_KEY_PASSWORD"
              SIGN=true
            fi
          else
            if [ -n "$MAC_CSC_LINK" ]; then
              export CSC_LINK="$MAC_CSC_LINK" CSC_KEY_PASSWORD="$MAC_CSC_KEY_PASSWORD"
              SIGN=true
              echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 -d > "$RUNNER_TEMP/AuthKey.p8"
              export APPLE_API_KEY="$RUNNER_TEMP/AuthKey.p8"
              export APPLE_API_KEY_ID="$APP_STORE_CONNECT_KEY_ID"
              export APPLE_API_ISSUER="$APP_STORE_CONNECT_ISSUER_ID"
            fi
          fi

          if [ "$SIGN" = false ]; then
            # Unsigned is fine for beta/auto builds (artifacts for testing). A
            # stable `latest` release must NEVER ship unsigned.
            if [ "$ELECTRON_BUILDER_CHANNEL" = "latest" ]; then
              echo "::error::refusing to build the 'latest' (stable) channel unsigned — provide signing secrets"
              exit 1
            fi
            echo "::warning::no signing cert for ${{ runner.os }} — building UNSIGNED (auto-update apply not testable)"
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            EXTRA+=(--config.mac.notarize=false)
          fi

          # Rebuild @nut-tree-fork's native libnut prebuild against this
          # runner's Electron ABI. Without this, `require('@nut-tree-fork/nut-js')`
          # throws inside the packaged app and Computer Use silently falls back
          # to INPUT_BACKEND_HINT. `-o` (--only) is a STRICT filter — unrelated
          # native deps (bufferutil, utf-8-validate, …) keep their own prebuilds.
          if [ "${{ runner.os }}" = "Windows" ]; then
            npx electron-rebuild -f -o @nut-tree-fork/libnut-win32
          else
            npx electron-rebuild -f -o @nut-tree-fork/libnut-darwin
          fi

          npm run build:electron
          npm run compile:electron
          node scripts/copy-renderer.js
          # `channel` lives under `publish`, not at the config root — override
          # the nested key. ${EXTRA[@]+...} guards against unbound-variable on an
          # empty array under `set -u` in bash 3.2 (the macOS runner's bash).
          npx electron-builder --config.publish.channel="$ELECTRON_BUILDER_CHANNEL" ${EXTRA[@]+"${EXTRA[@]}"} --publish never
          echo "DESKTOP_SIGNED=$SIGN" >> "$GITHUB_ENV"

      - name: Verify macOS notarization (stapled)
        if: runner.os == 'macOS' && env.DESKTOP_SIGNED == 'true'
        run: |
          set -euo pipefail
          APP=$(find release/mac* -maxdepth 1 -name '*.app' | head -n1 || true)
          if [ -n "$APP" ]; then
            echo "Validating $APP"
            xcrun stapler validate "$APP" || { echo "::error::stapler validate failed — app is not notarized"; exit 1; }
          fi

      - name: Upload installers (.exe / .dmg) as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nexior-desktop-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/*.yml
          retention-days: 30
          if-no-files-found: error

      # Attach this OS's installer to the GitHub Release for the version
      # currently on main (@acedatacloud/nexior_v<package.json version>, created
      # by github-release.yaml on the beachball tag). We gate on the release
      # ALREADY EXISTING (mirroring build-android.yaml) rather than on a tag ref,
      # so the daily scheduled build still attaches to the day's release. A
      # manual desktop-v* / workflow_dispatch run never creates a bare release.
      - name: Resolve release tag from package.json
        id: rel
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN || github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          REL_TAG="@acedatacloud/nexior_v${VERSION}"
          echo "tag=$REL_TAG" >> "$GITHUB_OUTPUT"
          if gh release view "$REL_TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::release $REL_TAG not found — skipping installer attach (artifacts still uploaded)."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Attach installer to GitHub Release
        if: steps.rel.outputs.exists == 'true'
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN || github.token }}
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          files: ${{ runner.os == 'Windows' && 'release/*.exe' || 'release/*.dmg' }}
          fail_on_unmatched_files: true

  # --------------------------------------------------------------------------
  # Publish to the live COS update feed — RELEASES ONLY, behind the admin
  # approval gate (`desktop-release` environment). Skipped for plain main pushes.
  # --------------------------------------------------------------------------
  publish:
    name: Publish to COS feed
    needs: [resolve, build]
    if: needs.resolve.outputs.publish == 'true'
    environment: desktop-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download built installers
        uses: actions/download-artifact@v7
        with:
          path: release
          pattern: nexior-desktop-*
          merge-multiple: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Publish to COS
        env:
          TENCENT_CLOUD_SECRET_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          TENCENT_CLOUD_SECRET_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
        run: |
          python3 -m pip install --quiet cos-python-sdk-v5
          python3 scripts/publish_desktop_release.py --dist release
