name: CommonFrontend package contract

on:
  workflow_dispatch:
    inputs:
      package_spec:
        description: Package name and exact version, tag, or tarball to validate
        required: false
        default: '@acedatacloud/core@0.8.1'
        type: string
      profile:
        description: Contract profile fixture name
        required: false
        default: core
        type: string
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/commonfrontend-contract.yml'
      - 'scripts/commonfrontend-contract.mjs'
      - 'scripts/fixtures/commonfrontend-contract/**'

permissions:
  contents: read

concurrency:
  group: commonfrontend-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: ${{ inputs.profile || 'core' }} contract
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Validate package contract
        env:
          PACKAGE_SPEC: ${{ inputs.package_spec || '@acedatacloud/core@0.8.1' }}
          PROFILE: ${{ inputs.profile || 'core' }}
          REPORT_PATH: artifacts/commonfrontend-contract/report.json
        run: node scripts/commonfrontend-contract.mjs

      - name: Upload contract report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commonfrontend-contract-${{ inputs.profile || 'core' }}
          path: artifacts/commonfrontend-contract/report.json
          if-no-files-found: error
          retention-days: 14
