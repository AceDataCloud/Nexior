name: Translate i18n

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/i18n/zh-CN/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    name: Auto-translate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the bot PAT so that the commit pushed by create-pull-request below
          # is authored by the bot user. This is required for the resulting PR to
          # trigger downstream workflows (pull_request events created with the
          # default GITHUB_TOKEN are intentionally suppressed by GitHub).
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run translation
        env:
          ACEDATACLOUD_OPENAI_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
        run: python3 scripts/translate_i18n.py

      - name: Verify i18n key coverage
        # Belt-and-braces: the translate script already validates each batch
        # round-trip, but this catches any unexpected drift before opening
        # the PR. See PlatformFrontend #287/#289 for the regression history.
        run: python3 scripts/check_i18n_coverage.py

      - name: Create translation PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          # MUST be a PAT (not GITHUB_TOKEN), otherwise the resulting PR will not
          # trigger any workflows (including ci.yaml's pull_request job).
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          commit-message: 'ci: auto-translate i18n from zh-CN'
          title: 'ci: auto-translate i18n from zh-CN'
          body: |
            Auto-generated i18n translation updates from zh-CN source changes.
          branch: ci/auto-translate-i18n
          delete-branch: true
          add-paths: |
            src/i18n/
          labels: |
            i18n
            automated-pr

      - name: Auto-approve translation PR
        if: ${{ steps.cpr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          gh pr review ${{ steps.cpr.outputs.pull-request-number }} --approve --repo ${{ github.repository }}

      - name: Enable auto-merge for translation PR
        if: ${{ steps.cpr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --auto --squash --repo ${{ github.repository }}
