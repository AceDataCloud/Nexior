name: Translate i18n

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/i18n/zh-CN/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    name: Auto-translate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Run translation
        env:
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
        run: yarn translate

      - name: Create translation PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'ci: auto-translate i18n from zh-CN'
          title: 'ci: auto-translate i18n from zh-CN'
          body: |
            Auto-generated i18n translation updates from zh-CN source changes.
          branch: ci/auto-translate-i18n
          delete-branch: true
          add-paths: |
            src/i18n/
          labels: |
            i18n
            automated-pr
