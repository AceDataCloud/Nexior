# electron-builder config for the Nexior desktop client.
# Packaging/signing/notarization run in CI (see .github/workflows/desktop.yml);
# secrets come from CI env, never the repo.
appId: com.acedatacloud.nexior.desktop
productName: AceData
copyright: Copyright © Ace Data Cloud

directories:
  output: release
  buildResources: build

# Inject the Electron entry into the PACKAGED app's package.json only, so the
# source package.json `main` (the @acedatacloud/nexior npm library entry) stays
# untouched and beachball publish is unaffected.
extraMetadata:
  main: electron/dist/main.js

files:
  - electron/dist/** # compiled main/preload/protocol/updater/auth-state
  - electron/renderer/** # copied dist-electron (the Vite build)

# @nut-tree-fork/libnut-{win32,darwin,linux} ships a .node native addon that
# electron loads via `require`. Node's dynamic loader cannot resolve modules
# inside app.asar, so the .node file MUST be unpacked to app.asar.unpacked/.
# Without this the Computer Use tool falls back to INPUT_BACKEND_HINT even
# after electron-rebuild produced the right ABI binary.
asarUnpack:
  - node_modules/@nut-tree-fork/**/*

# macOS registers these into Info.plist (CFBundleURLTypes). The desktop scheme
# is distinct from the mobile com.acedatacloud.nexior:// so they can't collide
# on one machine.
protocols:
  - name: AceData Desktop
    schemes:
      - acedata-desktop

win:
  # build/icon.ico (multi-resolution AceData brand icon). NSIS also derives the
  # installer/uninstaller icons from this by default.
  icon: build/icon.ico
  target:
    - nsis
  # Signing is driven by the standard electron-builder env vars in CI:
  #   CSC_LINK            base64 of the OV/EV code-signing .pfx
  #   CSC_KEY_PASSWORD    its password
  # (No cert config here — electron-builder picks up CSC_* automatically. For
  # Azure Trusted Signing instead, add a custom `sign` hook.)

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

mac:
  # build/icon.icns (AceData brand icon, generated by scripts/gen-desktop-icons.sh).
  icon: build/icon.icns
  # Two separate DMGs — x64 (Intel) and arm64 (Apple Silicon). Preferred over a
  # `universal` build, which fails to lipo-merge native prebuilds shipped by the
  # Solana/walletconnect deps (bufferutil/utf-8-validate). electron-updater's
  # latest-mac.yml lists both, so auto-update picks the right one per machine;
  # the download page offers "Intel" vs "Apple Silicon".
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # TCC usage strings for the opt-in local-tool tiers (screen/mic/camera/
  # automation). Without these macOS hard-crashes the app on first access.
  extendInfo:
    NSScreenCaptureUsageDescription: AceData lets the AI capture your screen only when you run a screen tool.
    NSAudioCaptureUsageDescription: AceData records system audio only when you run an audio-capture tool.
    NSMicrophoneUsageDescription: AceData uses the microphone only for voice tools you start.
    NSCameraUsageDescription: AceData uses the camera only for vision tools you start.
    NSAppleEventsUsageDescription: AceData controls other apps only when you run an automation tool.
  # electron-builder 26.x requires `notarize` to be a boolean. Credentials come
  # from env at sign time (any ONE of these sets):
  #   1) APPLE_API_KEY + APPLE_API_KEY_ID + APPLE_API_ISSUER   (App Store Connect API key — CI's choice)
  #   2) APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID
  #   3) APPLE_KEYCHAIN + APPLE_KEYCHAIN_PROFILE
  # If none are set electron-builder signs but SILENTLY skips notarization →
  # Gatekeeper blocks user machines, so CI must provide them (see
  # .github/workflows/desktop.yml). The unsigned path overrides this to `false`
  # via `--config.mac.notarize=false`.
  notarize: true

publish:
  provider: generic
  # electron-builder does NOT interpolate ${channel} in `url`. Use a FIXED base
  # url; channel selection is via the `channel` field + file naming
  # (latest.yml vs beta.yml), resolved under this base.
  url: https://cdn.acedata.cloud/nexior/desktop
  channel: latest # CI overrides to `beta` for pre-release builds
