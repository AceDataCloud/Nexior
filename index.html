<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      `viewport-fit=cover` is required so iOS Safari / Capacitor expose
      `env(safe-area-inset-*)` (notch + home indicator) — without it those
      env vars all resolve to 0px and our mobile layout draws under the
      Dynamic Island / home bar. The other flags are retained from the
      previous tag to keep the existing keyboard / pinch behaviour.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, max-age=0, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Ace Data Cloud - AI Hub</title>
    <meta
      name="description"
      content="AI-powered creative hub — generate images with Midjourney & Flux, create music with Suno, produce videos with Luma & Sora, chat with GPT, Claude, Gemini & DeepSeek."
    />
    <meta
      name="keywords"
      content="AI Hub,Midjourney,Suno,Flux,Luma,Sora,GPT,Claude,Gemini,DeepSeek,AI Image,AI Music,AI Video,AI Chat"
    />
    <!--
      Canonical and og:url are set dynamically below so the same bundle, served
      independently from multiple official hostnames (hub.acedata.cloud,
      studio.acedata.cloud, hub-test.acedata.cloud), advertises the correct
      origin instead of always pointing at hub.acedata.cloud.
    -->
    <script>
      (function () {
        try {
          var origin = window.location.origin;
          var path = window.location.pathname || '/';
          var canonical = document.createElement('link');
          canonical.setAttribute('rel', 'canonical');
          canonical.setAttribute('href', origin + path);
          document.head.appendChild(canonical);
          var ogUrl = document.createElement('meta');
          ogUrl.setAttribute('property', 'og:url');
          ogUrl.setAttribute('content', origin + path);
          document.head.appendChild(ogUrl);
        } catch (e) {
          /* no-op */
        }
      })();
    </script>
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ace Data Cloud" />
    <meta property="og:title" content="Ace Data Cloud - AI Hub" />
    <meta
      property="og:description"
      content="AI-powered creative hub — generate images with Midjourney & Flux, create music with Suno, produce videos with Luma & Sora, chat with GPT, Claude, Gemini & DeepSeek."
    />
    <meta property="og:image" content="https://cdn.acedata.cloud/logo.png" />
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ace Data Cloud - AI Hub" />
    <meta
      name="twitter:description"
      content="AI-powered creative hub — generate images with Midjourney & Flux, create music with Suno, produce videos with Luma & Sora, chat with GPT, Claude, Gemini & DeepSeek."
    />
    <meta name="twitter:image" content="https://cdn.acedata.cloud/logo.png" />
    <link rel="icon" href="/src/images/favicon.ico" />
    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://cdn.acedata.cloud" crossorigin />
    <link rel="dns-prefetch" href="https://platform.acedata.cloud" />
    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Load Inter without blocking first paint: request via `media="print"` so
      the browser does not block render on the stylesheet, then swap to `all`
      once it loads. Falls back to a synchronous `<link>` for clients without JS.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      />
    </noscript>
    <script>
      // Resolve the user's chosen theme BEFORE first paint and toggle
      // `html.dark` accordingly. Without this, users who picked dark mode
      // (or fall through to Nexior's `dark` cookie default — see
      // `src/utils/initializer.ts` `initializeTheme`) get a white-flash
      // boot screen until the Vue app boots and re-applies the cookie.
      // Mirrors the pattern used in PlatformFrontend's index.html.
      (() => {
        try {
          const normalizeTheme = (value) => {
            if (!value) return null;
            const lower = String(value).trim().toLowerCase();
            if (lower === 'dark') return 'dark';
            if (lower === 'light') return 'light';
            return null;
          };

          const query = new URLSearchParams(window.location.search);
          const queryTheme = normalizeTheme(query.get('theme'));
          const cookieMatch = document.cookie.match(/(?:^|;\s*)THEME=([^;]+)/);
          const cookieTheme = normalizeTheme(cookieMatch ? decodeURIComponent(cookieMatch[1]) : null);
          const localTheme = normalizeTheme(localStorage.getItem('vueuse-color-scheme'));

          // Priority: query > cookie > localStorage > Nexior default (`dark`).
          // We do NOT fall back to OS preference here, because Nexior's app-
          // level `initializeTheme` defaults missing cookies to `dark`; if we
          // honored the OS we'd flicker from light → dark on first boot for
          // light-OS users.
          const resolvedTheme = queryTheme || cookieTheme || localTheme || 'dark';
          document.documentElement.classList.toggle('dark', resolvedTheme === 'dark');
          document.documentElement.style.colorScheme = resolvedTheme === 'dark' ? 'dark' : 'light';
        } catch (e) {
          /* no-op */
        }
      })();
    </script>
    <script>
      // Pre-paint the per-site wallpaper BEFORE Vue mounts so users with a
      // cloud-configured background don't see a "flash of no wallpaper,
      // then wallpaper" on every page load while the bundle boots, fetches
      // /api/v1/sites/, and the App.vue watcher fires. `App.vue` writes
      // the resolved {image, blur, opacity} into sessionStorage on every
      // store change (see `src/utils/wallpaper.ts`); we read it back here.
      //
      // This is "best effort": first-ever load on a new tab has no cache,
      // so the original FOUC still happens for that one paint. Subsequent
      // reloads / SPA navigations land instantly. sessionStorage (not
      // localStorage) on purpose \u2014 prevents stale per-browser caches
      // from outliving an admin's wallpaper change across browser sessions.
      (() => {
        try {
          const raw = sessionStorage.getItem('nexior:wallpaper-cache');
          if (!raw) return;
          const cfg = JSON.parse(raw);
          if (!cfg || typeof cfg.image !== 'string' || !cfg.image) return;
          // Same escape rule as `src/utils/wallpaper.ts` \u2014 keep it
          // duplicated here because this script must NOT import from the
          // bundle (it runs before module loading).
          const safe = cfg.image.replace(/["\\\n\r]/g, '');
          const blur = typeof cfg.blur === 'number' ? Math.max(0, Math.min(40, cfg.blur)) : 12;
          const opacity = typeof cfg.opacity === 'number' ? Math.max(60, Math.min(98, cfg.opacity)) : 92;
          const root = document.documentElement;
          root.style.setProperty('--app-bg-image-url', 'url("' + safe + '")');
          root.style.setProperty('--app-bg-blur', blur + 'px');
          root.style.setProperty('--app-surface-alpha', (opacity / 100).toString());
          root.classList.add('has-wallpaper');
        } catch (e) {
          /* no-op \u2014 corrupt cache, private mode, etc. App.vue will repaint shortly. */
        }
      })();
    </script>
    <script>
      var _hmt = _hmt || [];
      // Defer Baidu analytics so it never blocks initial paint or competes for
      // bandwidth with the application bundle. `requestIdleCallback` lets the
      // browser pick an idle moment; `setTimeout` is a fallback for Safari.
      (function () {
        var inject = function () {
          var hm = document.createElement('script');
          hm.async = true;
          hm.src = 'https://hm.baidu.com/hm.js?6216b5ba30d8e35b2319b4c0331cbf21';
          var s = document.getElementsByTagName('script')[0];
          s.parentNode.insertBefore(hm, s);
        };
        if ('requestIdleCallback' in window) {
          requestIdleCallback(inject, { timeout: 4000 });
        } else {
          setTimeout(inject, 2000);
        }
      })();
    </script>
    <style>
      :root {
        --boot-bg: #ffffff;
        --boot-fg: #0b0b0b;
        --boot-muted: rgba(0, 0, 0, 0.55);
        --boot-spinner-1: #07eea6;
        --boot-spinner-2: #29bee4;
        --boot-spinner-3: #23abff;
      }

      /*
       * Driven by the inline pre-paint theme script above (which sets
       * `html.dark` from query/cookie/localStorage before first paint).
       * Avoid `@media (prefers-color-scheme: dark)` here because Nexior's
       * default cookie value is `dark` regardless of OS preference, and we
       * don't want a light-OS user flashing white on every reload.
       */
      html.dark {
        --boot-bg: #000000;
        --boot-fg: #ffffff;
        --boot-muted: rgba(255, 255, 255, 0.65);
      }

      /*
       * Boot-time wallpaper rules. Duplicated (intentionally) from
       * `src/assets/scss/_common.scss` so that when the pre-paint script
       * above sets `html.has-wallpaper` + the `--app-bg-*` vars BEFORE
       * the bundle stylesheet has loaded, we still actually PAINT the
       * wallpaper instead of just storing CSS vars that nothing consumes
       * yet. Once the bundle CSS loads it has the same rules at the same
       * specificity, so the cascade is a no-op transition.
       *
       * Keep these in sync with `_common.scss` if either side changes.
       */
      html.has-wallpaper,
      html.has-wallpaper body {
        background-color: transparent;
      }
      html.has-wallpaper body::before {
        content: '';
        position: fixed;
        inset: -5%;
        z-index: -1;
        background-image: var(--app-bg-image-url);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        filter: blur(var(--app-bg-blur, 0px));
        pointer-events: none;
      }

      html,
      body,
      #app {
        height: 100%;
      }

      body {
        margin: 0;
        background: var(--boot-bg);
        color: var(--boot-fg);
        font-family:
          'Inter',
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }

      .boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: var(--boot-bg);
      }

      .boot__content {
        position: relative;
        display: grid;
        justify-items: center;
        gap: 14px;
        padding: 24px 18px;
        z-index: 1;
      }

      .boot__loader {
        width: 72px;
        height: 72px;
        position: relative;
        border-radius: 999px;
      }

      .boot__loader::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: conic-gradient(
          from 90deg,
          var(--boot-spinner-1),
          var(--boot-spinner-2),
          var(--boot-spinner-3),
          var(--boot-spinner-1)
        );
        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 10px), #000 calc(100% - 9px));
        mask: radial-gradient(farthest-side, transparent calc(100% - 10px), #000 calc(100% - 9px));
        animation: boot-spin 0.9s linear infinite;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot__loader::before,
        .boot__loader::after {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot" aria-label="Loading" role="status">
        <div class="boot__content">
          <div class="boot__loader" aria-hidden="true"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
