# ---- Gzip compression ----
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_static on;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

server_tokens off;

server {
    listen       80;
    server_name  localhost;

    # ---- Security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Set shared proxy headers once here ----
    # Make sure to include these BEFORE your location blocks.
    proxy_http_version 1.1;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;

    location /api/v1/ {
        proxy_pass https://platform.acedata.cloud;
        client_max_body_size  20m;
    }

    # ---- Static assets: hash-based filenames → immutable caching ----
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # Serve /.well-known/llms.txt as alias to /llms.txt (llmstxt.org spec)
    location = /.well-known/llms.txt {
        root /usr/share/nginx/html;
        try_files /llms.txt =404;
    }

    # ---- HTML / SPA shell: NEVER cache ----
    # index.html (and any *.html) hardcodes the hashed asset filenames of
    # the current build (e.g. <script src="/assets/index-Be3-2h2U.js">).
    # If a CDN edge keeps an old index.html after a deploy, browsers
    # receive the old hashes and 404 on the new chunks — exactly the
    # outage we hit on studio.acedata.cloud (#560 deploy).
    # Hashed assets in /assets/ are content-addressed, so they stay
    # `immutable` forever; only the HTML shell needs no-store.
    location ~* \.html$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files   $uri    $uri/   /index.html;
        # Same no-cache policy when the SPA fallback serves /index.html
        # for a deep link (e.g. /veo, /chatgpt).
        add_header Cache-Control "no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    error_page  404              /404.html;
    error_page   500 502 503 504  /50x.html;

    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}